protocol_version: phase2-v2
model_name: ft_transformer
rank_included: true
fixed:
  n_heads: 8
search:
  n_layers: {type: int, low: 1, high: 4}
  d_token: {type: stepped_int, low: 16, high: 384, step: 16}
  d_ff_factor: {type: uniform, low: 0.66, high: 2.66}
  attention_dropout: {type: uniform, low: 0.0, high: 0.5}
  ffn_dropout: {type: uniform, low: 0.0, high: 0.5}
  residual_dropout: {type: uniform, low: 0.0, high: 0.2}
  learning_rate: {type: log_uniform, low: 3.0e-5, high: 1.0e-3}
  weight_decay: {type: log_uniform, low: 1.0e-4, high: 1.0e-1}
forbidden: [ple_n_bins, ple_boundaries, n_experts, top_k]
