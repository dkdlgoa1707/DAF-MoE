protocol_version: phase2-v1
model_name: tabr
rank_included: true
fixed:
  tabr_n_candidates: 96
  tabr_dropout1: 0.0
  plr_lite: true
search:
  tabr_d_main: {type: int, low: 96, high: 384}
  tabr_context_dropout: {type: uniform, low: 0.0, high: 0.6}
  tabr_dropout0: {type: uniform, low: 0.0, high: 0.6}
  tabr_encoder_n_blocks: {type: int, low: 0, high: 1}
  tabr_predictor_n_blocks: {type: int, low: 1, high: 2}
  learning_rate: {type: log_uniform, low: 3.0e-5, high: 1.0e-3}
  weight_decay:
    type: zero_mixture
    zero_probability: 0.5
    nonzero: {type: log_uniform, low: 1.0e-6, high: 1.0e-4}
  plr_n_frequencies: {type: int, low: 16, high: 96}
  plr_embedding_dim: {type: int, low: 16, high: 64}
  plr_frequency_scale: {type: log_uniform, low: 1.0e-2, high: 100.0}
forbidden: [ple_n_bins, ple_boundaries, n_experts, top_k]
