protocol_version: phase2-v1
model_name: xgboost
rank_included: true
fixed:
  tree_method: hist
  enable_categorical: true
  grow_policy: depthwise
  n_estimators: 2000
  early_stopping_rounds: 300
search:
  max_depth: {type: int, low: 4, high: 10}
  learning_rate: {type: log_uniform, low: 0.005, high: 0.1}
  subsample: {type: uniform, low: 0.6, high: 1.0}
  colsample_bylevel: {type: uniform, low: 0.6, high: 1.0}
  colsample_bynode: {type: uniform, low: 0.6, high: 1.0}
  min_child_weight: {type: log_uniform, low: 1.0e-3, high: 5.0}
  reg_alpha: {type: log_uniform, low: 1.0e-4, high: 5.0}
  reg_lambda: {type: log_uniform, low: 1.0e-4, high: 5.0}
  gamma:
    type: zero_mixture
    zero_probability: 0.5
    nonzero: {type: log_uniform, low: 1.0e-8, high: 7.0}
forbidden: [device]
