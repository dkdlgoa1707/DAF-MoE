protocol_version: phase2-v2
model_name: tabm_ple
rank_included: false
fixed:
  architecture: tabm-mini+updated-PLE
  k: 32
search:
  n_layers: {type: int, low: 1, high: 4}
  d_emb: {type: int, low: 64, high: 1024}
  dropout:
    type: zero_mixture
    zero_probability: 0.5
    nonzero: {type: uniform, low: 0.0, high: 0.5}
  ple_n_bins: {type: int, low: 8, high: 32}
  learning_rate: {type: log_uniform, low: 5.0e-5, high: 3.0e-3}
  weight_decay:
    type: zero_mixture
    zero_probability: 0.5
    nonzero: {type: log_uniform, low: 1.0e-4, high: 1.0e-1}
forbidden: [plr_n_frequencies, plr_embedding_dim, plr_frequency_scale]
