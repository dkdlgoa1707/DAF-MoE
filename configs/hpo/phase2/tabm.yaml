protocol_version: phase2-v1
model_name: tabm
rank_included: true
fixed:
  architecture: tabm-mini
  k: 32
search:
  n_layers: {type: int, low: 1, high: 5}
  d_emb: {type: int, low: 64, high: 1024}
  dropout:
    type: zero_mixture
    zero_probability: 0.5
    nonzero: {type: uniform, low: 0.0, high: 0.5}
  learning_rate: {type: log_uniform, low: 1.0e-4, high: 5.0e-3}
  weight_decay:
    type: zero_mixture
    zero_probability: 0.5
    nonzero: {type: log_uniform, low: 1.0e-4, high: 1.0e-1}
forbidden: [ple_n_bins, ple_boundaries, plr_n_frequencies, plr_embedding_dim, plr_frequency_scale]
